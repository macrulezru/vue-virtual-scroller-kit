name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  unit:
    name: unit (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      # stylelint 17 requires Node >=20.19 — CSS syntax doesn't vary by Node version,
      # so it's enough to run this once rather than pinning an older stylelint just to
      # keep it working on the Node 18 leg.
      - run: npm run lint:css
        if: matrix.node == 20
      - run: npm run test
      - run: npm run build

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci
        working-directory: demo
      - run: npx playwright install --with-deps chromium
        working-directory: demo
      - run: npm run test:e2e
        working-directory: demo
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: demo/playwright-report/
          retention-days: 7
