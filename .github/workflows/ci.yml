name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  unit:
    name: unit (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # jsdom 29 (used by the unit test suite) and stylelint 17 both declare
        # engines.node: "^20.19.0 || ^22.13.0 || >=24.0.0" — Node 18 is EOL and no
        # longer supported by either, not just incidentally incompatible.
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run lint:css
      - run: npm run test
      - run: npm run build

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci
        working-directory: demo
      - run: npx playwright install --with-deps chromium
        working-directory: demo
      - run: npm run test:e2e
        working-directory: demo
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: demo/playwright-report/
          retention-days: 7
